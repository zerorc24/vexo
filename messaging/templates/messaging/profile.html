{% extends "messaging/base_dm.html" %}

{% block content %}

<div class="profile-page">

    <div class="profile-card">

        <!-- PROFILE IMAGE -->

        <div class="profile-image-wrapper">

            {% if profile.avatar %}

                <img
                src="{{ profile.avatar.url }}"
                class="profile-image">

            {% else %}

                <div class="avatar-large">
                    {{ request.user.username|first|upper }}
                </div>

            {% endif %}

            <label for="avatar-upload" class="upload-btn">
                <i class="fa-solid fa-camera"></i>
            </label>

        </div>

        <!-- USER INFO -->

        <h2>
            {{ request.user.username }}
        </h2>

        <p class="status">

            {% if profile.online %}
                🟢 Online
            {% else %}
                ⚫ Offline
            {% endif %}

        </p>

        <!-- FORM -->

        <form method="POST"
              enctype="multipart/form-data">

            {% csrf_token %}

            <input
            type="file"
            id="avatar-upload"
            name="avatar"
            hidden>

            <div class="input-group">

                <label>
                    Username
                </label>

                <input
                type="text"
                name="username"
                value="{{ request.user.username }}">

            </div>

            <div class="input-group">

                <label>
                    Bio
                </label>

                <textarea
                name="bio"
                placeholder="Write something...">{{ profile.bio }}</textarea>

            </div>

            <button type="submit">
                Save Changes
            </button>

        </form>

    </div>

</div>

<style>

.profile-page{

    min-height:100%;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:30px;
}

.profile-card{

    width:100%;
    max-width:420px;

    background:rgba(15,23,32,.95);

    border:1px solid rgba(255,255,255,.05);

    border-radius:28px;

    padding:35px;

    text-align:center;

    box-shadow:
    0 20px 60px rgba(0,0,0,.35);

    animation:fadeIn .4s ease;
}

/* IMAGE */

.profile-image-wrapper{

    position:relative;

    width:120px;
    height:120px;

    margin:0 auto 20px;
}

.profile-image{

    width:120px;
    height:120px;

    border-radius:30px;

    object-fit:cover;

    border:4px solid rgba(255,255,255,.06);
}

.avatar-large{

    width:120px;
    height:120px;

    border-radius:30px;

    background:linear-gradient(
    135deg,
    #00d2a0,
    #00a6ff);

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:42px;
    font-weight:800;

    color:white;
}

.upload-btn{

    width:38px;
    height:38px;

    border-radius:14px;

    background:#182431;

    display:flex;
    align-items:center;
    justify-content:center;

    position:absolute;

    right:-4px;
    bottom:-4px;

    cursor:pointer;

    color:white;

    border:2px solid #0f1720;
}

/* TEXT */

.profile-card h2{

    font-size:28px;

    margin-bottom:6px;
}

.status{

    color:#8ea2b5;

    margin-bottom:30px;

    font-size:14px;
}

/* FORM */

form{

    display:flex;
    flex-direction:column;

    gap:18px;
}

.input-group{

    text-align:left;
}

.input-group label{

    display:block;

    margin-bottom:8px;

    font-size:14px;
    font-weight:600;

    color:#dbe7f3;
}

.input-group input,
.input-group textarea{

    width:100%;

    border:none;
    outline:none;

    background:#182431;

    color:white;

    border-radius:16px;

    padding:14px 16px;

    font-size:14px;

    border:1px solid transparent;

    transition:.25s;
}

.input-group textarea{

    resize:none;

    height:100px;
}

.input-group input:focus,
.input-group textarea:focus{

    border-color:rgba(0,210,160,.4);

    box-shadow:
    0 0 0 4px rgba(0,210,160,.08);
}

/* BUTTON */

form button{

    height:54px;

    border:none;

    border-radius:18px;

    background:linear-gradient(
    135deg,
    #00d2a0,
    #00a6ff);

    color:white;

    font-size:15px;
    font-weight:700;

    cursor:pointer;

    transition:.25s;
}

form button:hover{

    transform:translateY(-2px);

    opacity:.95;
}

/* MOBILE */

@media(max-width:600px){

    .profile-page{
        padding:18px;
    }

    .profile-card{
        padding:24px;
    }

    .avatar-large,
    .profile-image{

        width:100px;
        height:100px;
    }
}

/* ANIMATION */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

{% endblock %}
