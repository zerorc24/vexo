<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}Vexo Chat{% endblock %}</title>

<!-- ================= PWA META ================= -->
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0b1220">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- ================= FONTS ================= -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* ================= RESET ================= */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Inter", sans-serif;
}

html, body {
    height: 100%;
    background: #0b1220;
    color: white;
    overflow: hidden;
}

/* ================= APP LAYOUT ================= */
.app {
    display: flex;
    height: 100vh;
}

/* ================= SIDEBAR ================= */
.sidebar {
    width: 280px;
    background: #111a2b;
    border-right: 1px solid rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    transition: 0.3s;
}

.sidebar.collapsed {
    width: 80px;
}

.hide {
    transition: 0.2s;
}

/* TOP */
.top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: linear-gradient(135deg, #00d2a0, #3aa0ff);
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
}

/* NAV */
.nav a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    margin: 6px 10px;
    border-radius: 12px;
    text-decoration: none;
    color: #94a3b8;
}

.nav a:hover,
.nav a.active {
    background: #18243a;
    color: white;
}

/* CHAT LIST */
.chat-list {
    flex: 1;
    overflow-y: auto;
}

.chat-item {
    display: flex;
    gap: 12px;
    padding: 12px;
    margin: 6px 10px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
}

.chat-item:hover {
    background: #18243a;
}

.avatar {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: linear-gradient(135deg, #00d2a0, #3aa0ff);
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
}

/* ================= MAIN ================= */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* HEADER */
.header {
    height: 60px;
    display: flex;
    align-items: center;
    padding: 0 15px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    background: rgba(255,255,255,0.02);
}

/* CONTENT */
.content {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

/* ================= MOBILE ================= */
@media(max-width:768px) {
    .sidebar {
        position: fixed;
        left: -100%;
        height: 100%;
        z-index: 1000;
    }

    .sidebar.show {
        left: 0;
    }
}

/* ================= SCROLLBAR ================= */
::-webkit-scrollbar {
    width: 5px;
}

::-webkit-scrollbar-thumb {
    background: #223445;
    border-radius: 10px;
}

</style>

{% block extra_css %}{% endblock %}
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <div class="top">

            <div class="logo">
                <div class="logo-icon">V</div>
                <div class="hide">Vexo</div>
            </div>

            <button onclick="toggleSidebar()">
                <i class="fa fa-bars"></i>
            </button>

        </div>

        <!-- NAV -->
        <div class="nav">

            <a href="{% url 'chat_list' %}" class="{% if request.resolver_match.url_name == 'chat_list' %}active{% endif %}">
                <i class="fa fa-comments"></i>
                <span class="hide">Chats</span>
            </a>

            <a href="{% url 'users_list' %}">
                <i class="fa fa-users"></i>
                <span class="hide">People</span>
            </a>

            <a href="{% url 'profile' %}">
                <i class="fa fa-user"></i>
                <span class="hide">Profile</span>
            </a>

        </div>

        <!-- CHAT LIST -->
        <div class="chat-list">
            {% block sidebar %}{% endblock %}
        </div>

    </aside>

    <!-- MAIN -->
    <main class="main">

        <div class="header">
            <h3>{% block header %}Vexo Chat{% endblock %}</h3>
        </div>

        <div class="content">
            {% block content %}{% endblock %}
        </div>

    </main>

</div>

<!-- ================= SIDEBAR TOGGLE ================= -->
<script>
function toggleSidebar(){
    document.querySelector(".sidebar").classList.toggle("collapsed");
}
</script>

<!-- ================= PWA SERVICE WORKER ================= -->
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('/static/sw.js')
        .then(function(registration) {
            console.log('SW registered:', registration.scope);
        })
        .catch(function(error) {
            console.log('SW failed:', error);
        });
    });
}
</script>

</body>
</html>
